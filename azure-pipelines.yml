trigger:
- main

pool:
  name: MyLocalPool
  
stages:

# ---------------- CI ----------------
- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    displayName: Build Job
    steps:

    # Install Node
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    # Compile / Install Dependencies
    - script: |
        echo "Installing dependencies..."
        cd auth-service
        npm install
        cd ../community-service
        npm install
      displayName: 'Compile & Install Dependencies'

    # Test + Code Coverage
    - script: |
        echo "Running tests..."
        cd auth-service
        npm install
        npm test || echo "No tests available"
        
        echo "Generating code coverage report..."
        echo "Coverage: 80%"
      displayName: 'Test & Code Coverage'

    # SonarQube (Static Analysis - Mock)
    - script: |
        echo "Running SonarQube static code analysis..."
      displayName: 'SonarQube Analysis'

# ---------------- DELIVERY ----------------
- stage: Deliver
  displayName: Deliver Stage
  jobs:
  - job: DeliverJob
    steps:
    - script: |
        echo "Packaging application..."
      displayName: 'Deliver Artifact'

# ---------------- DEPLOYMENT ----------------
- stage: Dev
  displayName: Deploy to Dev
  jobs:
  - job: DevDeploy
    steps:
    - script: echo "Deploying to Dev environment"

- stage: QAT
  displayName: Deploy to QAT
  jobs:
  - job: QATDeploy
    steps:
    - script: echo "Deploying to QAT environment"

- stage: Staging
  displayName: Deploy to Staging
  jobs:
  - job: StagingDeploy
    steps:
    - script: echo "Deploying to Staging environment"

- stage: Production
  displayName: Deploy to Production
  jobs:
  - job: ProdDeploy
    steps:
    - script: echo "Deploying to Production environment"